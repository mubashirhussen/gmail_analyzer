# GuardianMail — production Nginx (Module 12).
# TLS termination, gzip, security headers, and reverse proxy to api:8000.
# Mounted read-only at /etc/nginx/nginx.conf inside the nginx container.

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
      '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"referrer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"request_id":"$http_x_request_id"'
      '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens off;
    client_max_body_size 25m;
    client_body_timeout 30s;
    client_header_timeout 15s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # Distributed rate-limit backstop (in-app is authoritative).
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    upstream api_upstream {
        server api:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ---- HTTP -> HTTPS redirect (skip ACME challenges) --------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location /healthz                     { proxy_pass http://api_upstream; }
        location / { return 301 https://$host$request_uri; }
    }

    # ---- HTTPS ------------------------------------------------------------
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # Prometheus scrape (internal only — protect with token in FastAPI).
        location = /api/v1/platform/metrics {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health probes — never rate-limited.
        location ~ ^/(healthz|readyz|livez|version)$ {
            proxy_pass http://api_upstream;
            access_log off;
        }

        # API surface.
        location /api/ {
            limit_req  zone=api_rl burst=60 nodelay;
            limit_conn api_conn 32;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $req_id;
            proxy_set_header Connection "";
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
            proxy_buffering on;
            proxy_pass http://api_upstream;
        }

        # Root fallback → API (frontend is served separately).
        location / {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
