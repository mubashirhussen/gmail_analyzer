global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: guardianmail
    env: prod

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: guardianmail-api
    metrics_path: /api/v1/platform/metrics
    scheme: http
    static_configs:
      - targets: ["api:8000"]
    # METRICS_TOKEN gate: use bearer token header in production.
    # authorization:
    #   type: Bearer
    #   credentials_file: /etc/prometheus/metrics_token
