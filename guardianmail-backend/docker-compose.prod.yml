services:
  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --access-logfile -
    expose: ["8000"]

  worker:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    command: celery -A app.workers.celery_app.celery worker -l INFO --concurrency=4 -Q default,ocr,threat,report

  beat:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    command: celery -A app.workers.celery_app.celery beat -l INFO

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api]
    ports: ["80:80", "443:443"]
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
